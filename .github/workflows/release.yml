name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify plugin.json version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          BASE="${TAG%%-*}"
          MANIFEST=$(jq -r .version .claude-plugin/plugin.json)
          if [ "$BASE" != "$MANIFEST" ]; then
            echo "::error::Tag base version $BASE does not match plugin.json version $MANIFEST (tag was v$TAG)"
            exit 1
          fi

      - name: Verify marketplace.json version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          BASE="${TAG%%-*}"
          MANIFEST=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          if [ "$BASE" != "$MANIFEST" ]; then
            echo "::error::Tag base version $BASE does not match marketplace.json plugin version $MANIFEST (tag was v$TAG)"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
