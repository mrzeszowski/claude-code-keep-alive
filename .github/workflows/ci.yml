name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Shellcheck bin/
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./bin
          severity: warning

      - name: Validate plugin and marketplace manifests
        run: |
          jq -e . .claude-plugin/plugin.json
          jq -e . .claude-plugin/marketplace.json

      - name: Validate hooks manifest
        run: jq -e . hooks/hooks.json

      - name: Install yq
        run: sudo snap install yq

      - name: Validate command frontmatter
        run: |
          for f in commands/*.md; do
            echo "--- $f"
            awk '/^---$/{c++;next} c==1' "$f" | yq -e .
          done

  test:
    needs: lint
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install bats (Ubuntu)
        if: runner.os == 'Linux'
        uses: bats-core/bats-action@4.0.0

      - name: Install bats (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core

      - name: Install bats (Windows)
        if: runner.os == 'Windows'
        uses: bats-core/bats-action@4.0.0

      - name: Run bats suite
        shell: bash
        run: bats tests/
